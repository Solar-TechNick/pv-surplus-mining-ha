name: validate
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' requires the domain to be registered in home-assistant/brands,
          # which is only needed for the HACS *default store* — not for custom-repo
          # installs. Skip it so validation reflects custom-repo readiness.
          ignore: brands
